<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe4f1, #ffd6eb, #fff0f7);
            color: #5b2245;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 16px 60px;
        }

        .header {
            background: rgba(255,255,255,0.8);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(255, 105, 180, 0.15);
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0 0 10px;
            color: #d63384;
        }

        .header a {
            display: inline-block;
            margin-top: 8px;
            text-decoration: none;
            background: linear-gradient(135deg, #ff85b3, #ff5fa2);
            color: white;
            padding: 10px 18px;
            border-radius: 999px;
            font-weight: bold;
        }

        .msg {
            margin-bottom: 16px;
            padding: 14px;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 6px 18px rgba(255, 105, 180, 0.1);
        }

        .success {
            color: #c2185b;
        }

        .error {
            color: #d32f2f;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.9);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(255, 105, 180, 0.14);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            display: block;
        }

        .content {
            padding: 16px;
        }

        .content h3 {
            margin: 0 0 10px;
            color: #d63384;
        }

        .content p {
            margin: 6px 0;
        }

        .empty {
            background: rgba(255,255,255,0.85);
            border-radius: 24px;
            padding: 28px;
            text-align: center;
            font-size: 18px;
        }

        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>My Courses 💕</h1>
        <a th:href="@{/}">← Quay về Home</a>
    </div>

    <div th:if="${success}" class="msg success" th:text="${success}"></div>
    <div th:if="${error}" class="msg error" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(enrollments)}" class="empty">
        Bạn chưa đăng ký học phần nào hết á 🥹
    </div>

    <div class="grid" th:if="${!#lists.isEmpty(enrollments)}">
        <div class="card" th:each="enrollment : ${enrollments}">
            <img th:src="${enrollment.course.image}" alt="course image">
            <div class="content">
                <h3 th:text="${enrollment.course.name}"></h3>
                <p><strong>Tín chỉ:</strong> <span th:text="${enrollment.course.credits}"></span></p>
                <p><strong>Giảng viên:</strong> <span th:text="${enrollment.course.lecturer}"></span></p>
                <p><strong>Ngày đăng ký:</strong> <span th:text="${enrollment.enrollDate}"></span></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
