<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Không có quyền truy cập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe4f1, #ffd6eb, #fff0f7);
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            color:#5b2245;
        }
        .box{
            background: rgba(255,255,255,0.92);
            padding:40px;
            border-radius:28px;
            text-align:center;
            box-shadow:0 10px 28px rgba(255,105,180,0.16);
            max-width:500px;
            width:90%;
        }
        h1{
            color:#d63384;
            margin-top:0;
        }
        a{
            display:inline-block;
            margin-top:18px;
            text-decoration:none;
            background: linear-gradient(135deg, #ff85b3, #ff5fa2);
            color:white;
            padding:12px 18px;
            border-radius:999px;
            font-weight:bold;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>Oops~ Không có quyền truy cập 💔</h1>
    <p>Bạn không được phép vào trang này.</p>
    <a href="/">Quay về Home</a>
</div>
</body>
</html>
