<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }
        .box{
            width:400px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
        }
        .msg{
            color:red;
            margin-bottom:10px;
        }
        .success{
            color:green;
            margin-bottom:10px;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Đăng ký tài khoản</h2>

    <div th:if="${error}" class="msg" th:text="${error}"></div>
    <div th:if="${success}" class="success" th:text="${success}"></div>

    <form th:action="@{/register}" th:object="${student}" method="post">
        <input type="text" th:field="*{username}" placeholder="Username" required>
        <input type="email" th:field="*{email}" placeholder="Email" required>
        <input type="password" th:field="*{password}" placeholder="Password" required>
        <button type="submit">Đăng ký</button>
    </form>

    <p style="margin-top: 15px;">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
    </p>
</div>
</body>
</html>
