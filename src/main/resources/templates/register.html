<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe4f1, #ffd6eb, #fff0f7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5b2245;
        }

        .box {
            width: 420px;
            background: rgba(255,255,255,0.95);
            padding: 28px;
            border-radius: 26px;
            box-shadow: 0 10px 28px rgba(255,105,180,0.16);
            animation: fadeIn 0.6s ease;
        }

        h2 {
            text-align: center;
            color: #d63384;
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 14px;
            border: 2px solid #ffc2dc;
            outline: none;
            background: #fff8fc;
            font-size: 14px;
        }

        input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.12);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #ff69b4, #ff8ec7);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .msg {
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .error {
            background: #ffe0e0;
            color: #d32f2f;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .bottom {
            text-align: center;
            margin-top: 12px;
        }

        .bottom a {
            color: #d63384;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Đăng ký tài khoản 💕</h2>

    <!-- lỗi -->
    <div th:if="${error}" class="msg error" th:text="${error}"></div>

    <!-- success -->
    <div th:if="${success}" class="msg success" th:text="${success}"></div>

    <form th:action="@{/register}" th:object="${student}" method="post">

        <input type="text" th:field="*{username}" placeholder="Username" required>

        <input type="email" th:field="*{email}" placeholder="Email" required>

        <input type="password" th:field="*{password}" placeholder="Password" required>

        <button type="submit">Đăng ký</button>
    </form>

    <div class="bottom">
        Đã có tài khoản?
        <a th:href="@{/login}">Đăng nhập</a>
    </div>
</div>

</body>
</html>
