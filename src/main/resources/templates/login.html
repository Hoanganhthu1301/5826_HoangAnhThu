<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe4f1, #ffd6eb, #fff0f7);
            margin:0;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .box{
            width:420px;
            background:white;
            padding:28px;
            border-radius:24px;
            box-shadow:0 10px 28px rgba(255,105,180,0.16);
        }
        h2{
            text-align:center;
            color:#d63384;
            margin-top:0;
        }
        input{
            width:100%;
            padding:12px;
            margin:8px 0;
            box-sizing:border-box;
            border:2px solid #ffc2dc;
            border-radius:14px;
            outline:none;
        }
        input:focus{
            border-color:#ff69b4;
        }
        button{
            width:100%;
            padding:12px;
            background:linear-gradient(135deg, #ff69b4, #ff8ec7);
            color:white;
            border:none;
            border-radius:14px;
            font-weight:bold;
            cursor:pointer;
        }
        .msg{
            color:red;
            margin-bottom:10px;
        }
        .success{
            color:green;
            margin-bottom:10px;
        }
        .google-btn{
            display:block;
            text-align:center;
            text-decoration:none;
            margin-top:14px;
            padding:12px;
            border-radius:14px;
            background:#fff;
            border:2px solid #f3b1cf;
            color:#d63384;
            font-weight:bold;
        }
        .google-btn:hover{
            background:#fff5fa;
        }
        .bottom-text{
            text-align:center;
            margin-top:14px;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Đăng nhập 💕</h2>

    <div th:if="${param.error}" class="msg">
        Sai username hoặc password
    </div>

    <div th:if="${param.logout}" class="success">
        Bạn đã đăng xuất
    </div>

    <div th:if="${success}" class="success" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Đăng nhập</button>
    </form>

    <a class="google-btn" th:href="@{/oauth2/authorization/google}">
        Đăng nhập bằng Google
    </a>

    <div class="bottom-text">
        Chưa có tài khoản? <a th:href="@{/register}">Đăng ký</a>
    </div>
</div>
</body>
</html>
