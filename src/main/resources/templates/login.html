<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }
        .box{
            width:400px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
        }
        .msg{
            color:red;
            margin-bottom:10px;
        }
        .success{
            color:green;
            margin-bottom:10px;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Đăng nhập</h2>

    <div th:if="${param.error}" class="msg">
        Sai username hoặc password
    </div>

    <div th:if="${param.logout}" class="success">
        Bạn đã đăng xuất
    </div>

    <div th:if="${success}" class="success" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Đăng nhập</button>
    </form>

    <p style="margin-top: 15px;">
        Chưa có tài khoản? <a th:href="@{/register}">Đăng ký</a>
    </p>
</div>
</body>
</html>
