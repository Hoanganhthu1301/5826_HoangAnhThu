<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Course</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe4f1, #ffd6eb, #fff0f7);
            color: #5b2245;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 16px 60px;
        }

        .header {
            background: rgba(255,255,255,0.85);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(255, 105, 180, 0.14);
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            margin: 0 0 12px;
            color: #d63384;
        }

        .header-actions a {
            text-decoration: none;
            display: inline-block;
            margin: 6px;
            padding: 11px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ff85b3, #ff5fa2);
            color: white;
            font-weight: bold;
        }

        .msg {
            background: white;
            padding: 14px;
            border-radius: 16px;
            margin-bottom: 18px;
            color: #c2185b;
            font-weight: bold;
            box-shadow: 0 6px 18px rgba(255, 105, 180, 0.1);
        }

        .table-wrap {
            background: rgba(255,255,255,0.9);
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 10px 24px rgba(255, 105, 180, 0.14);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #f6c4db;
        }

        th {
            color: #d63384;
            background: #fff5fa;
        }

        td img {
            width: 110px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
        }

        .action-btn {
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            display: inline-block;
            margin-right: 6px;
        }

        .edit {
            background: linear-gradient(135deg, #ff8ec7, #ff5fa2);
        }

        .delete {
            background: linear-gradient(135deg, #ff6b81, #ff4757);
        }

        .empty {
            text-align: center;
            padding: 25px;
            color: #b0306f;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Quản lý học phần 💕</h1>
        <div class="header-actions">
            <a th:href="@{/admin/courses/create}">+ Thêm Course</a>
            <a th:href="@{/}">Về Home</a>
        </div>
    </div>

    <div th:if="${success}" class="msg" th:text="${success}"></div>

    <div class="table-wrap">
        <table th:if="${!#lists.isEmpty(courses)}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên học phần</th>
                <th>Hình ảnh</th>
                <th>Tín chỉ</th>
                <th>Giảng viên</th>
                <th>Danh mục</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}"></td>
                <td th:text="${course.name}"></td>
                <td>
                    <img th:src="${course.image}" alt="course image">
                </td>
                <td th:text="${course.credits}"></td>
                <td th:text="${course.lecturer}"></td>
                <td th:text="${course.category != null ? course.category.name : 'Chưa có'}"></td>
                <td>
                    <a class="action-btn edit" th:href="@{'/admin/courses/edit/' + ${course.id}}">Sửa</a>
                    <a class="action-btn delete"
                       th:href="@{'/admin/courses/delete/' + ${course.id}}"
                       onclick="return confirm('Bạn có chắc muốn xóa course này không?')">
                        Xóa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(courses)}" class="empty">
            Chưa có học phần nào hết á 🥹
        </div>
    </div>
</div>
</body>
</html>
